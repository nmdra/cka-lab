---
# =============================================================
# roles/common/tasks/main.yml
# Runs on ALL nodes (control-plane + workers)
# Sets up: kernel prereqs, containerd 2.x, kubeadm/kubelet/kubectl
# =============================================================

# ── Swap ───────────────────────────────────────────────────────
- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Remove swap entries from /etc/fstab (idempotent)
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '#\1'

# ── Kernel modules ────────────────────────────────────────────
- name: Persist required kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'

- name: Load kernel modules now
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

# ── Sysctl ───────────────────────────────────────────────────
- name: Set sysctl params for k8s networking
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables  = 1
      net.ipv4.ip_forward                 = 1
    mode: '0644'
  notify: Apply sysctl

- name: Apply sysctl now (initial run)
  command: sysctl --system
  changed_when: false

# ── containerd (Docker's upstream package — containerd.io 2.3.x) ──
- name: Install prerequisites for Docker APT repo
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present
    update_cache: true

- name: Create /etc/apt/keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  get_url:
    url: "https://download.docker.com/linux/ubuntu/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false   # don't re-download if already present

- name: Get Ubuntu codename
  command: bash -c ". /etc/os-release && echo $VERSION_CODENAME"
  register: ubuntu_codename
  changed_when: false

- name: Add Docker APT repository (deb822 format)
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: "https://download.docker.com/linux/ubuntu"
    suites: "{{ ubuntu_codename.stdout }}"
    components: stable
    architectures: "{{ ansible_architecture | replace('x86_64', 'amd64') }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
    enabled: true

- name: Install containerd.io (2.3.x from Docker repo)
  apt:
    name: "{{ containerd_package }}"   # containerd.io
    state: present
    update_cache: true

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Generate default containerd config
  shell: containerd config default > /etc/containerd/config.toml
  changed_when: true
  notify: Restart containerd

- name: Ensure CRI plugin is not disabled
  replace:
    path: /etc/containerd/config.toml
    regexp: 'disabled_plugins = \["cri"\]'
    replace: '# disabled_plugins = ["cri"]'
  notify: Restart containerd

- name: Enable SystemdCgroup in containerd config
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Flush handlers to apply containerd config immediately
  meta: flush_handlers

- name: Ensure containerd is enabled and started
  service:
    name: containerd
    state: started
    enabled: true

# ── Kubernetes APT repo ───────────────────────────────────────
- name: Create /etc/apt/keyrings if not present
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Kubernetes APT signing key
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'
    force: false

- name: Add Kubernetes APT repository (deb822 format)
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: deb
    uris: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor }}/deb/"
    suites: "/"
    components: []
    signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    state: present
    enabled: true

# ── Kubernetes packages ──────────────────────────────────────
# The package suffix (-1.1, -2.1 etc.) varies by patch release.
# Query the repo dynamically to get the exact installable version string,
# matching the official Kubernetes docs approach.
- name: Query exact kubelet package version for {{ k8s_version }}
  shell: "apt-cache madison kubelet | grep '{{ k8s_version }}' | head -1 | awk '{print $3}'"
  register: kubelet_pkg_version
  changed_when: false
  failed_when: kubelet_pkg_version.stdout == ''

- name: Install kubelet={{ kubelet_pkg_version.stdout }}, kubeadm, kubectl
  apt:
    name:
      - "kubelet={{ kubelet_pkg_version.stdout }}"
      - "kubeadm={{ kubelet_pkg_version.stdout }}"
      - "kubectl={{ kubelet_pkg_version.stdout }}"
    state: present
    update_cache: false

- name: Hold kube packages at pinned version
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Determine node IP on hostonly interface
  shell: ip -4 addr show eth1 | awk '/inet/ {print $2}' | cut -d/ -f1
  register: node_ip_output
  changed_when: false

- name: Set node_ip fact
  set_fact:
    node_ip: "{{ node_ip_output.stdout }}"

- name: Configure KUBELET_EXTRA_ARGS with node IP
  copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS="--node-ip={{ node_ip }}"
    mode: '0644'
  notify: Restart kubelet

- name: Enable and start kubelet
  service:
    name: kubelet
    state: started
    enabled: true

# ── Exam-style bash setup ─────────────────────────────────────
- name: Copy exam-setup.sh to vagrant home
  copy:
    src: ../../../exam-setup.sh
    dest: /home/vagrant/exam-setup.sh
    owner: vagrant
    group: vagrant
    mode: '0755'

- name: Source exam-setup.sh from .bashrc (idempotent)
  lineinfile:
    path: /home/vagrant/.bashrc
    line: "source /home/vagrant/exam-setup.sh"
    state: present

